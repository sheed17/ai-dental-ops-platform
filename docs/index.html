<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dental Ops Platform Legal</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #16213d;
        --muted: #52607a;
        --accent: #2057d6;
        --border: #dbe2ef;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 56px 20px 72px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(22, 33, 61, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }
      p {
        line-height: 1.6;
        color: var(--muted);
      }
      ul {
        margin: 24px 0 0;
        padding-left: 20px;
      }
      li + li {
        margin-top: 10px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Dental Ops Platform Legal</h1>
        <p>
          This page hosts the public legal documents for Dental Ops Platform, including
          the privacy policy and SMS program terms used for customer care, missed-call
          recovery, and after-hours communication workflows.
        </p>
        <ul>
          <li><a href="./privacy.html">Privacy Policy</a></li>
          <li><a href="./terms.html">SMS Terms and Conditions</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>

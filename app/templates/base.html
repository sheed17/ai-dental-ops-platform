<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dental Ops Platform</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1b2430; }
      header { background: #102542; color: white; padding: 20px 28px; }
      main { padding: 24px; }
      .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
      .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(16,37,66,.08); margin-bottom: 20px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 10px; border-bottom: 1px solid #e8edf5; text-align: left; vertical-align: top; }
      a { color: #0b63ce; text-decoration: none; }
      .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
      .pill.urgent, .pill.emergency { background: #ffe3e3; color: #c92a2a; }
      .pill.routine, .pill.informational { background: #e7f5ff; color: #1864ab; }
      .stack { display: flex; flex-direction: column; gap: 12px; }
      pre { white-space: pre-wrap; background: #f5f7fb; padding: 16px; border-radius: 8px; }
      form.inline { display: inline; }
      button { background: #0b63ce; color: white; border: 0; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
      select { padding: 8px; border-radius: 8px; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>Dental Ops Platform</h1>
      <p>After-hours calls, incidents, callbacks, and operational follow-through.</p>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
